<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — {{ title }}</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="wrap">
    <header class="hero">
      <p class="eyebrow">REVO · Identity</p>
      <h1>Manifest ingest</h1>
      <p class="lede">Entre com sua conta REVO para enviar manifestos.</p>
    </header>

    <section class="card" style="max-width:420px">
      <h2>Login</h2>
      {% if error %}
      <p class="err-banner">{{ error }}</p>
      {% endif %}
      <form method="post" action="/login" class="login-form">
        <label>
          Usuário ou e-mail
          <input name="username" type="text" required autocomplete="username" autofocus />
        </label>
        <label>
          Senha
          <input name="password" type="password" required autocomplete="current-password" />
        </label>
        <button type="submit">Entrar</button>
      </form>
      <p class="muted" style="margin-top:16px">
        <a class="link" href="{{ forgot_password_url }}" target="_blank" rel="noopener">
          Esqueci minha senha
        </a>
      </p>
    </section>
  </main>
</body>
</html>
